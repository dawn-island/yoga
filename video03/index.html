<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 소개 영상</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back {
            align-self: flex-start;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back:hover {
            color: #aaa;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .desc {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 24px;
        }

        .player-wrap {
            width: 100%;
            max-width: 900px;
        }

        .player {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
        }

        .player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <a class="back" href="../">← 목록으로</a>

    <h1>[18기]어깨허리햄스트링발목통증해결-횡격막360도활성화마사지-하부늑골⧸늑골거근의중요성 [720p]</h1>
    <p class="desc">2026.04.05</p>

    <div class="player-wrap">
        <div class="player">
            <iframe src="https://drive.google.com/file/d/1l7D22OCztllmuRSlWaMdxAYcazZJA7Qk/preview"
                allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen loading="lazy">
            </iframe>
        </div>
    </div>

</body>

</html>
